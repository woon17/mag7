<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnificent 7: Layoffs, Stock Prices & CapEx</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

  <!-- Top bar -->
  <header>
    <div class="header-row1">
      <h1>The Magnificent 7 — Tech Layoffs & Financial Impact</h1>
      <div class="group-info">
        <span class="group-label">Group 7</span>
        <span class="group-members">Yiwei &nbsp;·&nbsp; Haochen</span>
        <span class="group-members">Shufa &nbsp;·&nbsp; Isuru</span>
      </div>
      <button class="info-icon-btn" id="open-info-modal" title="About & How to use">ⓘ</button>
      <div class="static-viz-links">
        <a href="https://project-graph-1-2rluggj8njhnbhdl8ik7cz.streamlit.app/" target="_blank" class="static-viz-btn">Static Viz 1</a>
        <a href="https://www.google.com" target="_blank" class="static-viz-btn">Static Viz 2</a>
      </div>
      <div class="header-filters">
        <div id="company-filter" class="company-filter"></div>
        <div class="year-bench-row">
          <div id="year-filter" class="year-filter"></div>
          <div id="benchmark-filter" class="benchmark-filter"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main dashboard — all in one screen -->
  <div class="dashboard">

    <!-- Left: Stock chart (main) -->
    <div class="panel panel-main">
      <div class="panel-header">
        <h2>Stock Performance</h2>
        <div id="normalize-btns" class="normalize-btns">
          <span class="normalize-label">Normalize:</span>
          <button class="norm-btn active" data-norm="none">Off</button>
          <button class="norm-btn" data-norm="SPX">vs S&amp;P 500</button>
          <button class="norm-btn" data-norm="QQQ">vs Nasdaq-100</button>
        </div>
        <div class="legend" id="stock-legend"></div>
      </div>
      <div id="stock-chart">
        <div id="compare-info"></div>
        <div id="scrub-info"></div>
      </div>
    </div>

    <!-- Right column -->
    <div class="panel-right">

      <!-- Top right: CapEx -->
      <div class="panel panel-small panel-capex">
        <div class="panel-header">
          <h2>CapEx Spending</h2>
          <div class="legend" id="capex-legend"></div>
        </div>
        <div id="capex-chart"></div>
      </div>

      <!-- Bottom right: Layoff info cards -->
      <div class="panel panel-small panel-layoff">
        <div class="panel-header">
          <h2>Layoff Events</h2>
        </div>
        <div id="layoff-panel"></div>
      </div>

    </div>
  </div>

  <!-- Timeline scrubber bar at bottom -->
  <div id="timeline-bar">
    <div id="timeline-track">
      <div id="timeline-range"></div>
      <div id="timeline-cursor-start">
        <span id="range-start-date">Jan 2020</span>
      </div>
      <div id="timeline-cursor">
        <span id="current-date">Jan 2020</span>
      </div>
      <div id="timeline-events"></div>
    </div>
    <div class="timeline-labels">
      <span>2020</span><span>2021</span><span>2022</span><span>2023</span><span>2024</span>
    </div>
    <div class="timeline-footer">
      <span class="timeline-hint" id="timeline-hint">Move mouse to scrub · Drag on chart to compare ranges</span>
    </div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip"></div>

  <!-- Info modal (content loaded from info-modal.html) -->
  <div id="info-modal-container"></div>

  <script src="js/main.js"></script>
  <script>
    fetch('info-modal.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('info-modal-container').innerHTML = html;

        const modal = document.getElementById('info-modal');
        const slides = modal.querySelectorAll('.info-slide');
        const dots = modal.querySelectorAll('.dot');
        const prevBtn = document.getElementById('slide-prev');
        const nextBtn = document.getElementById('slide-next');
        let current = 0;

        function goTo(n) {
          slides[current].classList.remove('active');
          dots[current].classList.remove('active');
          current = n;
          slides[current].classList.add('active');
          dots[current].classList.add('active');
          prevBtn.disabled = current === 0;
          nextBtn.disabled = current === slides.length - 1;
        }

        prevBtn.addEventListener('click', () => { if (current > 0) goTo(current - 1); });
        nextBtn.addEventListener('click', () => { if (current < slides.length - 1) goTo(current + 1); });
        dots.forEach((d, i) => d.addEventListener('click', () => goTo(i)));

        document.getElementById('open-info-modal').addEventListener('click', () => {
          goTo(0);
          modal.classList.add('visible');
        });
        document.getElementById('close-info-modal').addEventListener('click', () => {
          modal.classList.remove('visible');
        });
        modal.addEventListener('click', (e) => {
          if (e.target === modal) modal.classList.remove('visible');
        });

        modal.classList.add('visible');
      });
  </script>
</body>

</html>
